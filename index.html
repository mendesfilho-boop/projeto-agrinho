<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AutoEnergia</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<header>

    <h1>AutoEnergia</h1>

    <p>
        Calculadora de consumo energético residencial
    </p>

</header>

<main>

<section>

<h2>Adicionar Equipamento</h2>

<form>

<input
type="text"
placeholder="Nome do equipamento">

<input
type="number"
placeholder="Potência (W)">

<input
type="number"
placeholder="Quantidade">

<input
type="number"
placeholder="Horas por dia">

<button>

Adicionar

</button>

</form>

</section>

<section>

<h2>Resultados</h2>

<p>Consumo diário: 0</p>

<p>Consumo mensal: 0</p>

<p>Painéis solares: 0</p>

<p>Baterias: 0</p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
